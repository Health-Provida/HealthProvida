		<script>
        document.addEventListener('DOMContentLoaded', function () {
            // --- Page Navigation ---
            const navLinks = document.querySelectorAll('.nav-link');
            const pages = document.querySelectorAll('.page');
            const headerLinks = document.querySelectorAll('nav .nav-link');

            function showPage(pageId) {
                pages.forEach(page => {
                    page.classList.add('hidden');
                });
                const activePage = document.getElementById(pageId);
                if (activePage) {
                    activePage.classList.remove('hidden');
                }
                window.scrollTo(0, 0);
            }

            function updateActiveLink(targetPage) {
                headerLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.dataset.page === targetPage) {
                        link.classList.add('active');
                    }
                });
            }

            navLinks.forEach(link => {
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    const pageId = this.dataset.page;
                    showPage(pageId);
                    updateActiveLink(pageId);
                    // Close mobile menu on navigation
                    if (!mobileMenu.classList.contains('hidden')) {
                        mobileMenu.classList.add('hidden');
                    }
                });
            });

            // --- Mobile Menu ---
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenuButton.addEventListener('click', function () {
                mobileMenu.classList.toggle('hidden');
            });

            // --- Provider Search Filter ---
            const searchInput = document.getElementById('search-input');
            const providerCards = document.querySelectorAll('.provider-card');
            searchInput.addEventListener('keyup', function (e) {
                const searchTerm = e.target.value.toLowerCase();
                providerCards.forEach(card => {
                    const searchTags = card.dataset.searchTags;
                    if (searchTags.includes(searchTerm)) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });

            // --- Multi-step Form ---
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');
            const formSteps = document.querySelectorAll('.form-step');
            const progressBar = document.getElementById('progress-bar');
            const stepCount = document.getElementById('step-count');
            const registrationForm = document.getElementById('registration-form');

            let currentStep = 1;

            function updateFormStep() {
                formSteps.forEach((step, index) => {
                    step.classList.add('hidden');
                    if (index + 1 === currentStep) {
                        step.classList.remove('hidden');
                    }
                });

                const progress = ((currentStep - 1) / (formSteps.length - 1)) * 100;
                progressBar.style.width = `${Math.max(33.33, progress)}%`;
                stepCount.textContent = currentStep;

                prevBtn.classList.toggle('hidden', currentStep === 1);
                nextBtn.classList.toggle('hidden', currentStep === formSteps.length);
                submitBtn.classList.toggle('hidden', currentStep !== formSteps.length);
            }
            
            function validateStep(stepNumber) {
                const inputs = formSteps[stepNumber - 1].querySelectorAll('input[required]');
                let isValid = true;
                inputs.forEach(input => {
                    if (!input.value.trim()) {
                        input.style.borderColor = 'red';
                        isValid = false;
                    } else {
                        input.style.borderColor = '';
                    }
                });
                return isValid;
            }

            nextBtn.addEventListener('click', () => {
                if (validateStep(currentStep) && currentStep < formSteps.length) {
                    currentStep++;
                    updateFormStep();
                }
            });

            prevBtn.addEventListener('click', () => {
                if (currentStep > 1) {
                    currentStep--;
                    updateFormStep();
                }
            });
            
            registrationForm.addEventListener('submit', (e) => {
                e.preventDefault();
                if (validateStep(currentStep)) {
                    alert('Application Submitted Successfully!');
                    registrationForm.reset();
                    currentStep = 1;
                    updateFormStep();
                }
            });

            updateFormStep();
        });
    </script>
	</body>
</html>
